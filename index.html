<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="description" content="DRIP CHECK — L'IA qui juge ta tenue. No cap."/>
  <meta property="og:title" content="DRIP CHECK ⚡"/>
  <meta property="og:description" content="Poste ta tenue. L'IA te juge. Tu ris. Tu partages."/>
  <title>DRIP CHECK ⚡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#080808;--white:#f5f0e8;--yellow:#FFE234;--pink:#FF3CAC;--green:#00FF87;--red:#FF2D2D;--purple:#B44FFF}
    body{background:var(--black);display:flex;justify-content:center;min-height:100vh}
    #app{width:100%;max-width:430px;background:var(--black);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--white);display:flex;flex-direction:column;align-items:center;padding-bottom:80px}
    .header{width:100%;padding:28px 20px 0;display:flex;flex-direction:column;align-items:center}
    .logo-wrap{position:relative;display:inline-block}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:8px;line-height:1;background:linear-gradient(135deg,var(--yellow) 0%,var(--pink) 60%,var(--purple) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .logo-beta{position:absolute;top:6px;right:-38px;background:var(--pink);color:#fff;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px}
    .tagline{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(245,240,232,.35);text-transform:uppercase;margin-top:6px;text-align:center}
    .lang-row{display:flex;gap:6px;margin-top:14px}
    .lang-btn{padding:4px 12px;border-radius:100px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(245,240,232,.4);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px}
    .lang-btn.active{background:rgba(255,255,255,.1);color:var(--white);border-color:rgba(255,255,255,.3)}
    .upload-zone{margin:24px 20px 0;width:calc(100% - 40px);border:2px dashed rgba(255,226,52,.25);border-radius:24px;padding:32px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;background:rgba(255,226,52,.02)}
    .upload-icon{font-size:44px;animation:bounce 2s ease-in-out infinite}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .upload-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--yellow)}
    .upload-sub{font-size:12px;color:rgba(245,240,232,.35);text-align:center;line-height:1.6}
    .btn-row{display:flex;gap:10px;margin-top:6px}
    .upload-btn{background:var(--yellow);color:var(--black);border:none;padding:11px 20px;border-radius:100px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer}
    .upload-btn.white{background:#fff}
    .preview-wrap{margin:24px 20px 0;width:calc(100% - 40px);position:relative}
    .preview-img{width:100%;border-radius:20px;display:block;max-height:360px;object-fit:cover}
    .preview-change{position:absolute;top:12px;right:12px;background:rgba(8,8,8,.8);border:1px solid rgba(255,255,255,.2);color:var(--white);padding:6px 14px;border-radius:100px;font-size:11px;font-family:'Space Mono',monospace;cursor:pointer}
    .section{margin:20px 20px 0;width:calc(100% - 40px)}
    .section-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(245,240,232,.35);text-transform:uppercase;margin-bottom:10px}
    .pills{display:flex;flex-wrap:wrap;gap:8px}
    .pill{padding:7px 15px;border-radius:100px;border:1px solid rgba(245,240,232,.12);font-size:13px;cursor:pointer;background:transparent;color:rgba(245,240,232,.7);font-family:'DM Sans',sans-serif}
    .pill.active{background:var(--yellow);color:var(--black);border-color:var(--yellow);font-weight:600}
    .style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .style-card{padding:10px 8px;border-radius:14px;border:1px solid rgba(245,240,232,.1);background:rgba(255,255,255,.03);text-align:center;cursor:pointer}
    .style-card.active{border-color:var(--yellow);background:rgba(255,226,52,.08)}
    .style-icon{font-size:22px;display:block;margin-bottom:4px}
    .style-name{font-size:11px;color:rgba(245,240,232,.7);font-weight:500}
    .style-card.active .style-name{color:var(--yellow)}
    .analyze-btn{margin:24px 20px 0;width:calc(100% - 40px);background:linear-gradient(135deg,var(--yellow),var(--pink));border:none;border-radius:18px;padding:18px;font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--black);cursor:pointer}
    .analyze-btn:disabled{opacity:.35;cursor:not-allowed}
    .loading-wrap{margin:40px 20px 0;width:calc(100% - 40px);display:flex;flex-direction:column;align-items:center;gap:14px}
    .loading-spinner{font-size:40px;animation:spin 1s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--yellow)}
    .loading-bar{width:100%;height:3px;background:rgba(255,226,52,.12);border-radius:10px;overflow:hidden}
    .loading-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--yellow),var(--pink));border-radius:10px;transition:width .3s}
    .result-card{margin:24px 20px 0;width:calc(100% - 40px);background:#111;border-radius:28px;overflow:hidden;border:1px solid rgba(255,255,255,.07)}
    .result-top{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
    .score-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(245,240,232,.3);text-transform:uppercase;margin-bottom:2px}
    .occasion-badge{font-family:'Space Mono',monospace;font-size:9px;color:rgba(245,240,232,.35);margin-top:2px}
    .score-num{font-family:'Bebas Neue',sans-serif;font-size:88px;line-height:1}
    .score-fire{color:#00FF87;text-shadow:0 0 30px rgba(0,255,135,.5)}
    .score-good{color:#FFE234;text-shadow:0 0 30px rgba(255,226,52,.4)}
    .score-mid{color:#FF3CAC;text-shadow:0 0 30px rgba(255,60,172,.4)}
    .score-low{color:#FF2D2D;text-shadow:0 0 30px rgba(255,45,45,.4)}
    .vibe-side{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
    .vibe-emoji{font-size:46px}
    .vibe-tag{font-family:'Space Mono',monospace;font-size:10px;color:rgba(245,240,232,.4);max-width:130px;line-height:1.5;text-align:right}
    .divider{margin:14px 20px;height:1px;background:rgba(255,255,255,.06)}
    .verdict{padding:0 20px;font-size:14px;line-height:1.75;color:rgba(245,240,232,.9)}
    .verdict strong{color:var(--yellow)}
    .refs-row{padding:0 20px;display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .ref-tag{padding:4px 10px;border-radius:100px;background:rgba(180,79,255,.12);border:1px solid rgba(180,79,255,.2);font-family:'Space Mono',monospace;font-size:10px;color:var(--purple)}
    .comparison{margin:14px 20px;background:rgba(255,226,52,.05);border:1px solid rgba(255,226,52,.12);border-radius:16px;padding:14px;display:flex;gap:12px}
    .comp-icon{font-size:32px;flex-shrink:0}
    .comp-name{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--yellow);display:block;margin-bottom:3px}
    .comp-text{font-size:12px;line-height:1.6;color:rgba(245,240,232,.6)}
    .challenge{margin:10px 20px 20px;background:rgba(255,60,172,.06);border:1px solid rgba(255,60,172,.18);border-radius:14px;padding:13px;font-size:13px;line-height:1.65;color:rgba(245,240,232,.75);display:flex;gap:10px}
    .share-row{margin:16px 20px 0;width:calc(100% - 40px);display:flex;gap:10px}
    .share-btn{flex:1;padding:13px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(245,240,232,.7);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
    .share-btn.primary{background:linear-gradient(135deg,var(--yellow),var(--pink));border:none;color:var(--black);font-weight:700;flex:1.5}
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,255,135,.15);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:100px;font-family:'Space Mono',monospace;font-size:11px;z-index:200;white-space:nowrap;animation:fadeInOut 2.5s ease forwards}
    @keyframes fadeInOut{0%{opacity:0}15%,75%{opacity:1}100%{opacity:0}}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,8,.96);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.05);padding:10px 0 22px;display:flex;justify-content:space-around;z-index:50}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.35}
    .nav-item.active{opacity:1}
    .nav-icon{font-size:22px}
    .nav-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:rgba(245,240,232,.6);text-transform:uppercase}
    .nav-item.active .nav-label{color:var(--yellow)}
    .hidden{display:none!important}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo-wrap">
      <div class="logo">DRIP CHECK</div>
      <span class="logo-beta">BETA</span>
    </div>
    <div class="tagline" id="tagline">L'IA qui juge ta tenue — no cap</div>
    <div class="lang-row">
      <button class="lang-btn active" onclick="setLang('fr')">🇫🇷 FR</button>
      <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
    </div>
  </div>

  <div class="upload-zone hidden" id="uploadZone">
    <div class="upload-icon">📸</div>
    <div class="upload-title" id="uploadTitle">BALANCE TA TENUE</div>
    <div class="upload-sub" id="uploadSub">Photo ou selfie — L'IA te dit tout<br>(elle ment jamais)</div>
    <div class="btn-row">
      <button class="upload-btn white" id="galleryBtn" onclick="document.getElementById('fileGallery').click()">🖼️ GALERIE</button>
      <button class="upload-btn" id="cameraBtn" onclick="document.getElementById('fileCamera').click()">📷 CAMÉRA</button>
    </div>
    <input type="file" id="fileGallery" accept="image/*" style="display:none" onchange="handleFile(this)">
    <input type="file" id="fileCamera" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)">
  </div>

  <div class="preview-wrap hidden" id="previewWrap">
    <img class="preview-img" id="previewImg" src="" alt="outfit">
    <button class="preview-change" id="changeBtn" onclick="reset()">Changer</button>
  </div>

  <div class="section">
    <div class="section-label" id="occLabel">C'est pour quelle occasion ?</div>
    <div class="pills" id="occasionPills"></div>
  </div>

  <div class="section">
    <div class="section-label" id="styleLabel">Ton vibe habituel ?</div>
    <div class="style-grid" id="styleGrid"></div>
  </div>

  <button class="analyze-btn" id="analyzeBtn" onclick="handleMainBtn()">📸 AJOUTE UNE PHOTO</button>

  <div class="loading-wrap hidden" id="loadingWrap">
    <div class="loading-spinner">⚡</div>
    <div class="loading-text" id="loadingText">ANALYSE EN COURS...</div>
    <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
  </div>

  <div class="result-card hidden" id="resultCard">
    <div class="result-top">
      <div>
        <div class="score-label">DRIP SCORE</div>
        <div class="occasion-badge" id="occasionBadge"></div>
        <div class="score-num" id="scoreNum">7</div>
      </div>
      <div class="vibe-side">
        <div class="vibe-emoji" id="vibeEmoji">🔥</div>
        <div class="vibe-tag" id="vibeTag"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="verdict" id="verdict"></div>
    <div class="refs-row" id="refsRow"></div>
    <div class="comparison">
      <div class="comp-icon" id="compIcon">✨</div>
      <div>
        <span class="comp-name" id="compName"></span>
        <span class="comp-text" id="compText"></span>
      </div>
    </div>
    <div class="challenge">
      <span>🎯</span>
      <span id="challengeText"></span>
    </div>
  </div>

  <div class="share-row hidden" id="shareRow">
    <button class="share-btn" onclick="reset()">🔄 Retry</button>
    <button class="share-btn primary" id="shareBtn" onclick="doShare()">📤 Partager</button>
  </div>

  <div class="toast hidden" id="toast"></div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="setNav('check')"><div class="nav-icon">⚡</div><div class="nav-label">CHECK</div></div>
    <div class="nav-item" onclick="setNav('wardrobe')"><div class="nav-icon">👗</div><div class="nav-label" id="navWardrobe">GARDE-ROBE</div></div>
    <div class="nav-item" onclick="setNav('feed')"><div class="nav-icon">🔥</div><div class="nav-label">FEED</div></div>
    <div class="nav-item" onclick="setNav('profile')"><div class="nav-icon">👤</div><div class="nav-label" id="navMe">MOI</div></div>
  </div>
</div>

<script>
var lang = 'fr';
var selectedOccasion = null;
var selectedStyle = null;
var imageData = null;
var loadInterval = null;
var fillInterval = null;
var currentResult = null;

var OCCASIONS = {
  fr: ['📚 Lycée','🎉 Soirée','🛒 Casual','💼 Entretien','🎭 Événement','🏃 Sport'],
  en: ['📚 School','🎉 Party','🛒 Casual','💼 Interview','🎭 Event','🏃 Sport']
};

var STYLES = [
  {icon:'🖤',name:'Streetwear'},{icon:'💅',name:'Clean Girl'},{icon:'🌸',name:'Soft / Y2K'},
  {icon:'🏀',name:'Sport Luxe'},{icon:'🎨',name:'Artsy'},{icon:'🌍',name:'Afro Vibes'}
];

var MSGS = {
  fr:['ANALYSE EN COURS...','SCAN DE LA TENUE...','JUGEMENT IMMINENT...','VERDICT QUI ARRIVE...'],
  en:['ANALYSING FIT...','SCANNING THE DRIP...','JUDGMENT INCOMING...','AI IS COOKING...']
};

function setNav(id) {
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active'); });
  event.currentTarget.classList.add('active');
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(function(b,i){
    b.classList.toggle('active',(i===0&&l==='fr')||(i===1&&l==='en'));
  });
  document.getElementById('tagline').textContent = l==='fr' ? "L'IA qui juge ta tenue — no cap" : "The AI that rates your fit — no cap";
  document.getElementById('uploadTitle').textContent = l==='fr' ? 'BALANCE TA TENUE' : 'DROP YOUR FIT';
  document.getElementById('uploadSub').innerHTML = l==='fr' ? "Photo ou selfie — L'IA te dit tout<br>(elle ment jamais)" : "Photo or selfie — AI tells you everything<br>(it never lies)";
  document.getElementById('galleryBtn').textContent = l==='fr' ? '🖼️ GALERIE' : '🖼️ GALLERY';
  document.getElementById('cameraBtn').textContent = l==='fr' ? '📷 CAMÉRA' : '📷 CAMERA';
  document.getElementById('changeBtn').textContent = l==='fr' ? 'Changer' : 'Change';
  document.getElementById('occLabel').textContent = l==='fr' ? "C'est pour quelle occasion ?" : "What's the occasion?";
  document.getElementById('styleLabel').textContent = l==='fr' ? 'Ton vibe habituel ?' : 'Your usual vibe?';
  document.getElementById('navWardrobe').textContent = l==='fr' ? 'GARDE-ROBE' : 'WARDROBE';
  document.getElementById('navMe').textContent = l==='fr' ? 'MOI' : 'ME';
  document.getElementById('shareBtn').textContent = l==='fr' ? '📤 Partager' : '📤 Share';
  selectedOccasion = null;
  renderPills();
  updateBtn();
}

function renderPills() {
  var el = document.getElementById('occasionPills');
  el.innerHTML = '';
  OCCASIONS[lang].forEach(function(o) {
    var b = document.createElement('button');
    b.className = 'pill' + (o===selectedOccasion?' active':'');
    b.textContent = o;
    b.onclick = function(){ selectedOccasion=o; renderPills(); updateBtn(); };
    el.appendChild(b);
  });
}

function renderStyles() {
  var el = document.getElementById('styleGrid');
  el.innerHTML = '';
  STYLES.forEach(function(s) {
    var d = document.createElement('div');
    d.className = 'style-card' + (s.name===selectedStyle?' active':'');
    d.innerHTML = '<span class="style-icon">'+s.icon+'</span><span class="style-name">'+s.name+'</span>';
    d.onclick = function(){ selectedStyle=s.name; renderStyles(); };
    el.appendChild(d);
  });
}

function updateBtn() {
  var btn = document.getElementById('analyzeBtn');
  if (!imageData) {
    btn.textContent = '📸 ' + (lang==='fr'?'AJOUTE UNE PHOTO':'ADD A PHOTO');
    btn.disabled = false;
  } else if (!selectedOccasion) {
    btn.textContent = '👆 ' + (lang==='fr'?"CHOISIS L'OCCASION":'PICK THE OCCASION');
    btn.disabled = true;
  } else {
    btn.textContent = '⚡ DRIP CHECK →';
    btn.disabled = false;
  }
}

function handleMainBtn() {
  if (!imageData) {
    document.getElementById('fileGallery').click();
  } else if (selectedOccasion) {
    analyze();
  }
}

function handleFile(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    imageData = e.target.result;
    document.getElementById('previewImg').src = imageData;
    document.getElementById('uploadZone').classList.add('hidden');
    document.getElementById('previewWrap').classList.remove('hidden');
    updateBtn();
  };
  reader.readAsDataURL(file);
}

function reset() {
  imageData = null; selectedOccasion = null; currentResult = null;
  document.getElementById('uploadZone').classList.remove('hidden');
  document.getElementById('previewWrap').classList.add('hidden');
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('shareRow').classList.add('hidden');
  document.getElementById('analyzeBtn').classList.remove('hidden');
  document.getElementById('fileGallery').value = '';
  document.getElementById('fileCamera').value = '';
  renderPills();
  updateBtn();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(function(){ t.classList.add('hidden'); }, 2600);
}

function doShare() {
  var score = currentResult ? currentResult.score : '';
  var text = lang==='fr'
    ? "J'ai eu "+score+"/10 sur DRIP CHECK 🔥 Tu feras mieux ? → dripcheck-app.netlify.app"
    : "I got "+score+"/10 on DRIP CHECK 🔥 Can you beat me? → dripcheck-app.netlify.app";
  if (navigator.share) {
    navigator.share({title:'DRIP CHECK ⚡', text:text, url:'https://dripcheck-app.netlify.app'})
      .catch(function(){
        navigator.clipboard && navigator.clipboard.writeText('https://dripcheck-app.netlify.app');
        showToast(lang==='fr'?'✅ Lien copié !':'✅ Link copied!');
      });
  } else {
    navigator.clipboard && navigator.clipboard.writeText('https://dripcheck-app.netlify.app');
    showToast(lang==='fr'?'✅ Lien copié !':'✅ Link copied!');
  }
}

function startLoading() {
  document.getElementById('loadingWrap').classList.remove('hidden');
  document.getElementById('analyzeBtn').classList.add('hidden');
  var msgs = MSGS[lang], i = 0;
  loadInterval = setInterval(function(){ document.getElementById('loadingText').textContent=msgs[i++%msgs.length]; }, 700);
  var pct = 0;
  fillInterval = setInterval(function(){ pct=Math.min(pct+2,90); document.getElementById('loadingFill').style.width=pct+'%'; }, 100);
}

function stopLoading() {
  clearInterval(loadInterval); clearInterval(fillInterval);
  document.getElementById('loadingFill').style.width='100%';
  setTimeout(function(){
    document.getElementById('loadingWrap').classList.add('hidden');
    document.getElementById('loadingFill').style.width='0%';
  }, 300);
}

function showResult(r) {
  currentResult = r;
  var scoreEl = document.getElementById('scoreNum');
  scoreEl.textContent = r.score;
  scoreEl.className = 'score-num ' + r.scoreClass;
  document.getElementById('vibeEmoji').textContent = r.emoji;
  document.getElementById('vibeTag').textContent = r.vibeTag;
  document.getElementById('verdict').innerHTML = r.verdict;
  document.getElementById('compIcon').textContent = r.comparisonIcon;
  document.getElementById('compName').textContent = r.comparisonName;
  document.getElementById('compText').textContent = r.comparisonText;
  document.getElementById('challengeText').innerHTML = r.challenge;
  document.getElementById('occasionBadge').textContent = (selectedOccasion||'') + (selectedStyle?' · '+selectedStyle:'');
  var refsRow = document.getElementById('refsRow');
  refsRow.innerHTML = '';
  (r.refs||[]).forEach(function(ref){
    var s = document.createElement('span');
    s.className = 'ref-tag';
    s.textContent = '#'+ref;
    refsRow.appendChild(s);
  });
  document.getElementById('resultCard').classList.remove('hidden');
  document.getElementById('shareRow').classList.remove('hidden');
  document.getElementById('analyzeBtn').classList.remove('hidden');
  document.getElementById('analyzeBtn').textContent = '🔄 '+(lang==='fr'?'RECOMMENCER':'TRY AGAIN');
  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('analyzeBtn').onclick = reset;
  setTimeout(function(){ document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'start'}); }, 100);
}

function buildPrompt() {
  return `You are DRIP CHECK — a world-class fashion AI with the sharp eye of a stylist, the cultural knowledge of a trend forecaster, and the psychology of a behavioral scientist. You understand that your verdict must feel PERSONAL, SPECIFIC, and SURPRISING every single time — because if users get the same note or the same suggestions twice, they leave forever.

OCCASION: ${selectedOccasion}
STYLE VIBE CLAIMED: ${selectedStyle || 'Not specified'}
LANGUAGE: ${lang === 'fr' ? 'French Gen Z — use varied slang: ouf, chelou, lourd, tu gères, wallah, frère, ma soeur, bahut, relou, stylé, la classe, banger, c\'est du feu, c\'est mort, t\'as tout compris, t\'as raté' : 'English Gen Z — use varied slang: slay, no cap, it\'s giving, understood the assignment, fire, mid, bussin, lowkey, highkey, main character, NPC, rent free, understood, ate and left no crumbs, not it'}

function compressImage(dataUrl, maxSize, quality) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h*maxSize/w); w = maxSize; }
        else { w = Math.round(w*maxSize/h); h = maxSize; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

async function analyze() {
  if (!imageData || !selectedOccasion) return;
  startLoading();
  try {
    var compressed = await compressImage(imageData, 800, 0.75);
    var b64 = compressed.split(',')[1];
    var res = await fetch('/.netlify/functions/analyze', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        messages: [{role:'user', content:[
          {type:'image', source:{type:'base64', media_type:'image/jpeg', data:b64}},
          {type:'text', text:buildPrompt()}
        ]}]
      })
    });
    var data = await res.json();
    if (data.error) throw new Error('API: '+JSON.stringify(data.error).slice(0,80));
    if (!data.content) throw new Error('No content: '+JSON.stringify(data).slice(0,80));
    var raw = (data.content||[]).find(function(b){return b.type==='text';});
    var text = raw ? raw.text : '';
    var match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON in: '+text.slice(0,80));
    var result = JSON.parse(match[0]);
    stopLoading();
    showResult(result);
  } catch(e) {
    console.error('DRIP ERROR:', e.message);
    stopLoading();
    showResult({
      score:7, scoreClass:'score-good', emoji:'🔥',
      vibeTag: lang==='fr'?"Solide. T'as géré.":'Solid. You got it.',
      verdict: lang==='fr'?'Ta tenue envoie du <strong>lourd</strong>. Bug technique mais ton style, lui, bug pas.':'Your fit is <strong>actually fire</strong>. Tech glitch but your drip is real.',
      comparisonIcon:'✨', comparisonName: lang==='fr'?'Version beta de toi-même':'Beta version of yourself',
      comparisonText: lang==='fr'?'En mise à jour. Le glow-up arrive.':'Still loading. The glow-up is coming.',
      refs:['main character','understood the assignment','Y2K energy'],
      challenge: lang==='fr'?'Ajoute une pièce statement — veste, bag ou bijou. Juste une.':'Add one statement piece — jacket, bag, or jewelry. Just one.'
    });
  }
}
